name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-pr-screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Check for screenshots in PR description
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: "${{ github.event.pull_request.body }}"
        run: |
          if [[ -z "$PR_BODY" ]]; then
            echo "::error::PR description is empty. Please add screenshots for UI changes."
            exit 1
          fi
          if ! echo "$PR_BODY" | grep -qE '!\[.*\]\(.*\)|<img.*src=.*'; then
            echo "::warning::No screenshots detected in PR description. If this PR contains UI changes, please add screenshots."
          else
            echo "✓ Screenshots found in PR description"
          fi

  server:
    runs-on: ubuntu-latest
    needs: check-pr-screenshots
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npx eslint src --ext .ts

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  mobile:
    runs-on: ubuntu-latest
    needs: check-pr-screenshots
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

  e2e:
    runs-on: ubuntu-latest
    needs: [server, mobile]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start server
        working-directory: server
        run: npm run dev &
        
      - name: Wait for server
        run: sleep 5

      - name: Run E2E tests
        run: npx playwright test --project=chromium

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30